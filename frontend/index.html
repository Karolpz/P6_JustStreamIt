                                <div>
                                    <h2 class="fw-bold" id="detailsModalLabel"></h2>
                                    <p class="fw-bold mb-1" id="modal-genre"></p>
                                    <p class="fw-bold mb-1" id="modal-duration"></p>

                                    <p class="fw-bold mb-3" id="modal-boxoffice"></p>
