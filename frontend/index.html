<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Just Stream It</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
        <img src="images/logo_mobile.png" alt="Logo Just Stream It" class="logo d-block d-md-none">
        <img src="images/logo_tablet.png" alt="Logo Just Stream It" class="logo d-none d-md-block d-lg-none">
        <img src="images/logo_desktop.png" alt="Logo Just Stream It" class="logo d-none d-lg-block">
        <h1 class="visually-hidden">Just Stream It</h1>

        <main>
            <section id="best-movie">
                <h2>Meilleur film</h2>
                <div class="card">
                    <div class="row ">

                            <img src="https://picsum.photos/230/330" alt="Affiche The Big Lebowski" class="img-fluid">
                        </div>
                        <div class="col-8">
                            <div class="card-body">
                                <h3 class="card-title">Lorem ipsum</h3>
                                <p class="card-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna
                                aliqua.</p>
                                <button class="btn btn-detail float-end">Détails</button>
                            </div>
                        </div>
                    </div>
                </div>
                </section>
            </section>
            <section>
                <h2>Films les mieux notés</h2>
            </section>
            <section>
                <h2>Mystery</h2>
            </section>
            <section>
                <h2>Science-Fiction</h2>
            </section>
            <section>
                <h2>Autres</h2>
            </section>
        </main>
